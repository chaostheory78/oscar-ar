<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oscar Face AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #instructions {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: #FFD700;
        font-family: Arial, sans-serif;
        font-size: 16px;
        padding: 12px 24px;
        border-radius: 30px;
        text-align: center;
        z-index: 999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="instructions">🏆 Point at an Oscar statue to reveal the truth</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <img id="face" src="shan-face.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target 0 = Oscar statue head -->
      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Your face floats over the Oscar head -->
        <!-- Adjust position/scale to fit perfectly once you test it -->
        <a-image
          src="#face"
          position="0 0.15 0"
          width="0.7"
          height="0.7"
          rotation="0 0 0"
          material="transparent: true; alphaTest: 0.1"
        ></a-image>

        <!-- Gold outline ring around the face -->
        <a-ring
          color="#FFD700"
          radius-inner="0.34"
          radius-outer="0.41"
          position="0 0.15 -0.01"
          material="opacity: 1"
        ></a-ring>

        <!-- Subtle gold fill behind face -->
        <a-circle
          color="#FFD700"
          radius="0.34"
          position="0 0.15 -0.02"
          material="opacity: 0.15"
        ></a-circle>

        <!-- Optional: floating text -->
        <a-text
          value="Should've been me"
          align="center"
          color="#FFD700"
          position="0 -0.3 0"
          scale="0.6 0.6 0.6"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        ></a-text>

      </a-entity>

    </a-scene>

  </body>
</html>
